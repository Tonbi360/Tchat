
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chat PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
</head>
<body>
    <div id="chat-container">
        <header>
            <h1>CHAT</h1>
            <div id="pagination-controls">
                <button id="prev-page">←</button>
                <span id="page-number">Today</span>
                <button id="next-page">→</button>
            </div>
        </header>
        
        <div id="messages">
            <!-- Messages will stream here from Firebase -->
        </div>

        <div id="input-area">
            <button id="expand-btn">＋</button>
            <form id="message-form" class="hidden">
                <input type="text" id="message-input" placeholder="Write..." autocomplete="off">
                <button type="submit" id="send-btn">SEND</button>
            </form>
        </div>
    </div>

    <!-- We use type="module" so we can use Firebase imports in app.js -->
    <script type="module" src="app.js"></script>
</body>
</html>
